        function applyDashboardPathSuggestion(alternativeGroups = []) {
            const suggestion = dashboardPathSuggestion || {};
            const matchingGroup = (alternativeGroups || []).find(group => normalizeValue(group.pathway) === normalizeValue(suggestion.recommendedPathway))
                || alternativeGroups[0];

            if (!matchingGroup) {
                navigateTo('dashboard');
                return;
            }

            const starterLesson = matchingGroup.lessons.find(lesson => !isLessonCompleted(lesson)) || matchingGroup.lessons[0] || {};
            const targetCategory = starterLesson.category || starterLesson.pathway || matchingGroup.pathway || AppState.learningPreferences.category;
            const proficiencyOptions = getRecommendedProficiencyOptions(AppState.learningPreferences.proficiency);
            const targetProficiency = suggestion.recommendedProficiency && proficiencyOptions.some(option => normalizeValue(option) === normalizeValue(suggestion.recommendedProficiency))
                ? suggestion.recommendedProficiency
                : (proficiencyOptions[0] || AppState.learningPreferences.proficiency || '');

            if (targetCategory) {
                setLearningPreference('category', targetCategory);
            }

            if (targetProficiency) {
                setLearningPreference('proficiency', targetProficiency);
            }

            navigateTo('dashboard');
        }

        async function requestDashboardPathSuggestion(context, fallbackSuggestion) {
            const requestToken = ++dashboardSuggestionRequestToken;

            if (AIRecommendationService.hasEndpoint()) {
                setDashboardPathSuggestion('Finding a fresh pathway for you...', 'info', fallbackSuggestion || {});
            } else if (fallbackSuggestion) {
                setDashboardPathSuggestion(fallbackSuggestion.message, fallbackSuggestion.tone, fallbackSuggestion);
                return fallbackSuggestion;
            }

            const aiSuggestion = await AIRecommendationService.generate(context);
            if (requestToken !== dashboardSuggestionRequestToken) {
                return fallbackSuggestion;
            }

            if (!aiSuggestion) {
                if (fallbackSuggestion) {
                    setDashboardPathSuggestion(fallbackSuggestion.message, fallbackSuggestion.tone, fallbackSuggestion);
                }
                return fallbackSuggestion;
            }

            setDashboardPathSuggestion(aiSuggestion.message, aiSuggestion.tone, aiSuggestion);
            return aiSuggestion;
        }

        function getQuestionPromptLabel(question, { isPronunciationQuestion = false, isSpellingQuestion = false } = {}) {
            if (isPronunciationQuestion || isSpellingQuestion) {
                return getPronunciationPrompt(question) || 'this word';
            }

            return question?.question || 'this clue';
        }

        function getAnswerDisplayText(value, fallback = 'the correct answer') {
            const text = (value || '').toString().trim();
            return text || fallback;
        }

        function getCoachVariant(question, variants, salt = '') {
            if (!Array.isArray(variants) || !variants.length) {
                return '';
            }

            const source = `${question?.question || ''}|${question?.answer || ''}|${question?.difficulty || ''}|${question?.lessonType || ''}|${currentQuestionIndex}|${salt}`;
            let hash = 0;

            for (let index = 0; index < source.length; index++) {
                hash = ((hash << 5) - hash) + source.charCodeAt(index);
                hash |= 0;
            }

            return variants[Math.abs(hash) % variants.length];
        }

        function getWordCountHint(text, label = 'answer') {
            const count = (text || '').toString().trim().split(/\s+/).filter(Boolean).length;
            if (!count) {
                return '';
            }

            return count === 1
                ? `The ${label} is a single word.`
                : `The ${label} has ${count} words.`;
        }

        function getApproxSyllableHint(text) {
            const normalized = (text || '').toString().toLowerCase().replace(/[^a-z]/g, '');
            if (!normalized) {
                return '';
            }

            const groups = normalized.match(/[aeiou]+/g);
            const syllables = Math.max(1, groups ? groups.length : 1);

            return syllables === 1
                ? 'Listen for one clear beat in the word.'
                : `Listen for about ${syllables} beats as you say it.`;
        }

        function getSpellingShapeHint(text) {
            const normalized = (text || '').toString().trim();
            if (!normalized) {
                return '';
            }

            const lettersOnly = normalized.replace(/[^A-Za-z]/g, '');
            const lengthHint = lettersOnly
                ? `It has ${lettersOnly.length} letters.`
                : '';
            const firstLetter = lettersOnly ? lettersOnly.charAt(0).toUpperCase() : '';
            const firstLetterHint = firstLetter ? `It starts with ${firstLetter}.` : '';

            return [lengthHint, firstLetterHint].filter(Boolean).join(' ');
        }

        function buildCoachFeedback({
            question,
            isCorrect,
            selectedChoice = '',
            correctAnswer = '',
            expectedAnswer = '',
            userResponse = '',
            isPronunciationQuestion = false,
            isSpellingQuestion = false,
            isPhraseTypingQuestion = false,
            isPhrasePronunciationQuestion = false
        }) {
            const clueLabel = getQuestionPromptLabel(question, { isPronunciationQuestion, isSpellingQuestion });
            const correctText = getAnswerDisplayText(correctAnswer || expectedAnswer);
            const chosenText = getAnswerDisplayText(selectedChoice || userResponse, '');
            const isImageQuestion = Boolean(question?.imageUrl);
            const attemptPrefix = getAttemptMessagePrefix();
            const answerWordCountHint = getWordCountHint(correctText);
            const pronunciationBeatHint = getApproxSyllableHint(correctText);
            const spellingShapeHint = getSpellingShapeHint(correctText);

            if (isPronunciationQuestion) {
                if (isCorrect) {
                    const successVariants = isPhrasePronunciationQuestion
                        ? [
                            'Great job. That phrase sounded solid.',
                            'Nice work. You delivered the phrase clearly.',
                            'Well done. That phrase came through nicely.'
                        ]
                        : [
                            'Good job. That pronunciation was on target.',
                            `Nice work. You said "${correctText}" clearly.`,
                            'Well done. Your pronunciation matched the target.'
                        ];

                    return {
                        tone: 'success',
                        message: getCoachVariant(question, successVariants, 'pronunciation-success')
                    };
                }

                const shouldRevealAnswer = getRemainingAttempts() === 0;
                const warningVariants = isPhrasePronunciationQuestion
                    ? shouldRevealAnswer
                        ? [
                            `Almost there. The target phrase is "${correctText}". No tries left after this attempt, so listen for the full rhythm as you move on.`,
                            `Good effort. The phrase to remember is "${correctText}". No tries left after this attempt, so keep its key words in mind.`,
                            `Last try on this one. The phrase was "${correctText}". Notice the pacing and word order for next time.`
                        ]
                        : [
                            `Almost there. ${attemptPrefix} Say it a little slower and focus on the key words before your next try.`,
                            `Close try. ${attemptPrefix} Keep the rhythm steady and stress the important words more clearly.`,
                            `Not quite yet. ${attemptPrefix} Try again with a slower pace and cleaner phrase timing.`
                        ]
                    : shouldRevealAnswer
                        ? [
                            `Almost there. The target word was "${correctText}". No tries left after this attempt, so listen for each syllable as you move on.`,
                            `Good effort. The pronunciation to remember is "${correctText}". No tries left after this attempt, so keep its sound pattern in mind.`,
                            `Last try on this one. The word was "${correctText}". Notice the syllables and pacing for next time.`
                        ]
                        : [
                            `Almost there. ${attemptPrefix} Slow down, listen again, and focus on each syllable before repeating it. ${pronunciationBeatHint}`,
                            `Close try. ${attemptPrefix} Try saying it more clearly one sound at a time. ${pronunciationBeatHint}`,
                            `Not quite yet. ${attemptPrefix} Repeat it slowly and keep the middle sounds crisp. ${pronunciationBeatHint}`
                        ];

                return {
                    tone: 'warning',
                    message: getCoachVariant(question, warningVariants, 'pronunciation-warning')
                };
            }

            if (isSpellingQuestion) {
                if (isCorrect) {
                    const successVariants = isPhraseTypingQuestion
                        ? [
                            'Good job. That phrase fits perfectly.',
                            'Nice work. You got the phrase right.',
                            'Well done. That phrase answer is correct.'
                        ]
                        : [
                            'Good job. That spelling is correct.',
                            `Nice work. You spelled "${correctText}" right.`,
                            'Well done. Your spelling matches the target.'
                        ];

                    return {
                        tone: 'success',
                        message: getCoachVariant(question, successVariants, 'spelling-success')
                    };
                }

                const comparisonText = chosenText
                    ? ` You entered "${chosenText}", so focus on the letters that differ.`
                    : '';
                const shouldRevealAnswer = getRemainingAttempts() === 0;

                const warningVariants = isPhraseTypingQuestion
                    ? shouldRevealAnswer
                        ? [
                            `Not quite. The phrase to remember is "${correctText}".${comparisonText} No tries left after this attempt, so notice the word order as you move on.`,
                            `Good effort. The correct phrase was "${correctText}".${comparisonText} Keep its structure in mind for next time.`,
                            `Last try on this one. The phrase was "${correctText}".${comparisonText} Watch how the clue maps to each word.`
                        ]
                        : [
                            `Not quite.${comparisonText} ${attemptPrefix} Use the clue and word order as your guide on the next try. ${answerWordCountHint}`,
                            `Close.${comparisonText} ${attemptPrefix} Rebuild the phrase from the clue one part at a time. ${answerWordCountHint}`,
                            `Almost there.${comparisonText} ${attemptPrefix} Check the word order before you submit again. ${answerWordCountHint}`
                        ]
                    : shouldRevealAnswer
                        ? [
                            `Not quite. The correct spelling is "${correctText}".${comparisonText} No tries left after this attempt, so study the letter pattern for next time.`,
                            `Good effort. The spelling to remember is "${correctText}".${comparisonText} Notice which letters changed.`,
                            `Last try on this one. The word was spelled "${correctText}".${comparisonText} Keep that spelling pattern in mind.`
                        ]
                        : [
                            `Not quite.${comparisonText} ${attemptPrefix} Break the word into smaller sounds before typing again. ${spellingShapeHint}`,
                            `Close.${comparisonText} ${attemptPrefix} Try typing it slowly syllable by syllable. ${spellingShapeHint}`,
                            `Almost there.${comparisonText} ${attemptPrefix} Watch the letters that change near the end. ${spellingShapeHint}`
                        ];

                return {
                    tone: 'warning',
                    message: getCoachVariant(question, warningVariants, 'spelling-warning')
                };
            }

            if (isCorrect) {
                const successVariants = isImageQuestion
                    ? [
                        'Good job. You matched the image correctly.',
                        'Nice work. That picture-answer pair is right.',
                        'Well done. You picked the correct word for the image.'
                    ]
                    : [
                        'Good job. That answer is correct.',
                        'Nice work. You matched the clue correctly.',
                        'Well done. You chose the right answer.'
                    ];

                return {
                    tone: 'success',
                    message: getCoachVariant(question, successVariants, 'choice-success')
                };
            }

            const shouldRevealAnswer = getRemainingAttempts() === 0;
            const contrastText = chosenText
                ? shouldRevealAnswer
                    ? `"${chosenText}" was close in theme, but "${correctText}" was the best match.`
                    : `"${chosenText}" seems close, but look more carefully at the clue or image.`
                : shouldRevealAnswer
                    ? `The correct answer was "${correctText}".`
                    : `Use the clue more carefully before your next try.`;

            const warningVariants = isImageQuestion
                ? shouldRevealAnswer
                    ? [
                        `Not quite. The correct answer was "${correctText}". ${contrastText}`,
                        `Good effort. This image matched "${correctText}". ${contrastText}`,
                        `Last try on this one. "${correctText}" was the best match for the picture. ${contrastText}`
                    ]
                    : [
                        `Almost there. ${attemptPrefix} Look again at the image details before your next try. Focus on size, shape, and the most obvious feature.`,
                        `Close. ${attemptPrefix} Focus on the animal or object in the picture more carefully before choosing again.`,
                        `Not quite yet. ${attemptPrefix} Compare the visible features in the picture with each option one more time.`
                    ]
                : shouldRevealAnswer
                    ? [
                        `Not quite. For "${clueLabel}", the correct answer was "${correctText}". ${contrastText}`,
                        `Good effort. "${correctText}" was the best answer for "${clueLabel}". ${contrastText}`,
                        `Last try on this one. "${correctText}" fit "${clueLabel}" best. ${contrastText}`
                    ]
                    : [
                        `Almost there. ${attemptPrefix} Read the clue once more and compare the choices carefully for exact meaning.`,
                        `Close. ${attemptPrefix} Use the clue wording more carefully and watch for small meaning differences.`,
                        `Not quite yet. ${attemptPrefix} Look for the choice that matches the clue most exactly, not just the same category.`
                    ];

            return {
                tone: 'warning',
                message: getCoachVariant(question, warningVariants, 'choice-warning')
            };
        }

        function parseAcceptedAnswers(value) {
            if (Array.isArray(value)) {
                return value
                    .map(item => (item || '').toString().trim())
                    .filter(Boolean);
            }

            if (typeof value !== 'string') {
                return [];
            }

            const trimmedValue = value.trim();
            if (!trimmedValue) {
                return [];
            }

            try {
                const parsedValue = JSON.parse(trimmedValue);
                if (Array.isArray(parsedValue)) {
                    return parsedValue
                        .map(item => (item || '').toString().trim())
                        .filter(Boolean);
                }
            } catch (error) {
                // Fall back to plain text parsing below.
            }

            return trimmedValue
                .split(',')
                .map(item => item.replace(/^["'\[\]\s]+|["'\[\]\s]+$/g, '').trim())
                .filter(Boolean);
        }

        function isPhrasePronunciationTypeValue(value) {
            const normalizedValue = normalizeValue(value);

            return normalizedValue === 'phrase pronunciation' ||
                normalizedValue === 'phrasepronunciation' ||
                normalizedValue === 'phrase pronounciation' ||
                normalizedValue === 'phrasepronounciation' ||
                normalizedValue === 'phrase_pronunciation' ||
                normalizedValue === 'phrase_pronounciation';
        }

        function isPronunciationQuestionData(question) {
            const normalizedType = normalizeValue(question?.type);
            const normalizedLessonType = normalizeValue(question?.lessonType);
            const hasRecognitionLang = Boolean((question?.recognitionLang || '').toString().trim());

            if (
                normalizedType === 'pronunciation' ||
                isPhrasePronunciationTypeValue(normalizedType) ||
                normalizedLessonType === 'pronunciation' ||
                isPhrasePronunciationTypeValue(normalizedLessonType) ||
                hasRecognitionLang
            ) {
                return true;
            }

            return false;
        }

        function isSpellingQuestionData(question, lesson = null) {
            const normalizedType = normalizeValue(question?.type);
            const normalizedLessonType = normalizeValue(question?.lessonType || lesson?.lessonType || lesson?.type);
            const normalizedDifficulty = normalizeDifficulty(question?.difficulty || lesson?.difficulty);
            const hasChoices = Array.isArray(question?.choices) && question.choices.length > 0;

            if (
                normalizedType === 'spelling' ||
                normalizedType === 'phrase typing' ||
                normalizedType === 'phrasetyping' ||
                normalizedType === 'phrase_typing' ||
                normalizedLessonType === 'spelling' ||
                normalizedLessonType === 'phrase typing' ||
                normalizedLessonType === 'phrasetyping' ||
                normalizedLessonType === 'phrase_typing'
            ) {
                return true;
            }

            return normalizedDifficulty === 'intermediate' && !hasChoices && !isPronunciationQuestionData(question);
        }

        function isPhraseTypingQuestionData(question, lesson = null) {
            const normalizedType = normalizeValue(question?.type);
            const normalizedLessonType = normalizeValue(question?.lessonType || lesson?.lessonType || lesson?.type);

            return normalizedType === 'phrase typing' ||
                normalizedType === 'phrasetyping' ||
                normalizedType === 'phrase_typing' ||
                normalizedLessonType === 'phrase typing' ||
                normalizedLessonType === 'phrasetyping' ||
                normalizedLessonType === 'phrase_typing';
        }

        function isPhrasePronunciationQuestionData(question, lesson = null) {
            const normalizedType = normalizeValue(question?.type);
            const normalizedLessonType = normalizeValue(question?.lessonType || lesson?.lessonType || lesson?.type);

            return isPhrasePronunciationTypeValue(normalizedType) ||
                isPhrasePronunciationTypeValue(normalizedLessonType);
        }

        function getAcceptedSpellingAnswers(question) {
            const answers = [
                getPronunciationTarget(question),
                ...(Array.isArray(question.acceptedAnswers) ? question.acceptedAnswers : [])
            ];

            return answers
                .map(item => (item || '').toString().trim())
                .filter(Boolean);
        }

        function isSpellingMatch(input, acceptedAnswers) {
            const normalizedInput = normalizeValue(input);
            if (!normalizedInput) {
                return false;
            }

            return acceptedAnswers.some((answer) => normalizeValue(answer) === normalizedInput);
        }

        function isPhraseKeywordMatch(input, acceptedAnswers) {
            const normalizedInput = normalizeValue(input);
            if (!normalizedInput) {
                return false;
            }

            return acceptedAnswers.some((answer) => {
                const normalizedAnswer = normalizeValue(answer);
                return Boolean(normalizedAnswer) && normalizedInput.includes(normalizedAnswer);
            });
        }

        function updateSpellingUiState() {
            const input = document.getElementById('spelling-answer-input');
            const statusText = document.getElementById('spelling-status');
            const checkBtn = document.getElementById('check-button');
            const answerCard = document.getElementById('spelling-answer-card');

            if (!input || !statusText || !checkBtn || !answerCard) {
                return;
            }

            input.value = spellingAnswer;
            statusText.textContent = '';
            statusText.style.color = '#FCA5A5';
            answerCard.style.borderColor = '#3A3A3A';
            answerCard.style.boxShadow = '';

            if (spellingCheckResult?.isCorrect) {
                statusText.textContent = currentTypingMode === 'phrase'
                    ? 'Correct phrase. Great job!'
                    : 'Correct spelling. Great job!';
                statusText.style.color = '#86EFAC';
                answerCard.style.borderColor = '#10B981';
                answerCard.style.boxShadow = '0 0 0 3px rgba(16,185,129,0.2)';

                    : `Not quite. Correct spelling: ${spellingCheckResult.expected}`;

                answerCard.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.18)';

            checkBtn.disabled = !spellingAnswer.trim();
            checkBtn.style.opacity = checkBtn.disabled ? '0.5' : '1';

        function getAcceptedPronunciationAnswers(question) {
            const answers = [
                getPronunciationTarget(question),
                ...(Array.isArray(question.acceptedAnswers) ? question.acceptedAnswers : [])
            ];

            return answers
                .map(item => (item || '').toString().trim())
                .filter(Boolean);
        }

        function getLevenshteinDistance(source, target) {
            const sourceText = source || '';
            const targetText = target || '';
            const matrix = Array.from({ length: sourceText.length + 1 }, () => new Array(targetText.length + 1).fill(0));

            for (let row = 0; row <= sourceText.length; row++) {
                matrix[row][0] = row;
            }

            for (let column = 0; column <= targetText.length; column++) {
                matrix[0][column] = column;
            }

            for (let row = 1; row <= sourceText.length; row++) {
                for (let column = 1; column <= targetText.length; column++) {
                    const cost = sourceText[row - 1] === targetText[column - 1] ? 0 : 1;
                    matrix[row][column] = Math.min(
                        matrix[row - 1][column] + 1,
                        matrix[row][column - 1] + 1,
                        matrix[row - 1][column - 1] + cost
                    );
                }
            }

            return matrix[sourceText.length][targetText.length];
        }

        function isPronunciationMatch(transcript, acceptedAnswers) {
            const normalizedTranscript = normalizeValue(transcript);

            if (!normalizedTranscript) {
                return false;
            }

            return acceptedAnswers.some((answer) => {
                const normalizedAnswer = normalizeValue(answer);

                if (!normalizedAnswer) {
                    return false;
                }

                if (normalizedTranscript === normalizedAnswer) {
                    return true;
                }

                if (normalizedTranscript.includes(normalizedAnswer) || normalizedAnswer.includes(normalizedTranscript)) {
                    return true;
                }

                const longestLength = Math.max(normalizedTranscript.length, normalizedAnswer.length);
                if (!longestLength) {
                    return false;
                }

                const distance = getLevenshteinDistance(normalizedTranscript, normalizedAnswer);
                const similarity = 1 - (distance / longestLength);

                return similarity >= 0.8;
            });
        }

            statusText.textContent = pronunciationError || '';
            statusText.style.color = '#FCA5A5';
            transcriptCard.style.boxShadow = '';
            transcriptCard.style.borderColor = '#3A3A3A';

            if (pronunciationCheckResult?.isCorrect) {

                statusText.style.color = '#86EFAC';

            } else if (pronunciationCheckResult && !pronunciationCheckResult.isCorrect) {
                statusText.textContent = currentPronunciationMode === 'phrase'
                    ? `Not quite. Expected phrase: ${pronunciationCheckResult.expected}`
                    : `Not quite. Expected: ${pronunciationCheckResult.expected}`;
                statusText.style.color = '#FCA5A5';
                transcriptCard.style.borderColor = '#EF4444';
                transcriptCard.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.18)';
            } else if (!PronunciationChecker.isSupported()) {
                statusText.textContent = 'Speech recognition is not supported on this device/browser.';
                statusText.style.color = '#FBBF24';
            }

            checkBtn.disabled = !pronunciationTranscript || isListeningForPronunciation;
            checkBtn.style.opacity = checkBtn.disabled ? '0.5' : '1';
        }

        async function startPronunciationListening(question) {
            pronunciationTranscript = '';
            pronunciationError = '';
            pronunciationCheckResult = null;

            updatePronunciationUiState();

            try {
                if (!NativeSpeechRecognition.isSupported()) {
                    await MicrophoneAccess.ensurePermission();
                }
            } catch (error) {
                pronunciationError = error?.message || 'Microphone permission is required.';
                updatePronunciationUiState();
                return;
            }

            PronunciationChecker.startListening({
                lang: question.recognitionLang || 'fil-PH',
                onStart: () => {
                    isListeningForPronunciation = true;
                    updatePronunciationUiState();
                },
                onResult: (transcript) => {
                    pronunciationTranscript = transcript;
                    pronunciationError = '';
                    updatePronunciationUiState();
                },
                onError: (errorMessage) => {
                    pronunciationError = errorMessage;
                    updatePronunciationUiState();
                },
                onEnd: () => {
                    isListeningForPronunciation = false;
                    updatePronunciationUiState();
                }
            });
        }

        function checkAnswer() {
            const currentQuestion = questions[currentQuestionIndex];
            const isPronunciationQuestion = isPronunciationQuestionData(currentQuestion);
            const selectedLesson = getSelectedLesson();
            const isSpellingQuestion = isSpellingQuestionData(currentQuestion, selectedLesson);
            const isPhraseTypingQuestion = isPhraseTypingQuestionData(currentQuestion, selectedLesson);
            const isPhrasePronunciationQuestion = isPhrasePronunciationQuestionData(currentQuestion, selectedLesson);
            currentQuestionAttemptCount++;

            if (isPronunciationQuestion) {
                const acceptedAnswers = getAcceptedPronunciationAnswers(currentQuestion);
                const expectedAnswer = acceptedAnswers[0] || getPronunciationTarget(currentQuestion);
                const isCorrect = isPhrasePronunciationQuestion
                    ? isPhraseKeywordMatch(pronunciationTranscript, acceptedAnswers)
                    : isPronunciationMatch(pronunciationTranscript, acceptedAnswers);
                pronunciationCheckResult = {
                    isCorrect,
                    expected: expectedAnswer
                };
                const recommendation = buildCoachFeedback({
                    question: currentQuestion,
                    isCorrect,
                    expectedAnswer,
                    userResponse: pronunciationTranscript,
                    isPronunciationQuestion: true,
                    isPhrasePronunciationQuestion
                });
                setLessonCoachFeedback(recommendation.message, recommendation.tone);
                requestAiCoachFeedback(
                    buildAiRecommendationContext({
                        question: currentQuestion,
                        isCorrect,
                        expectedAnswer,
                        userResponse: pronunciationTranscript,
                        isPronunciationQuestion: true,
                        isPhrasePronunciationQuestion
                    }),
                    recommendation
                );
                updatePronunciationUiState();

                const checkBtn = document.getElementById('check-button');
                if (checkBtn) {
                    checkBtn.disabled = true;
                    checkBtn.style.opacity = '0.5';
                }

                if (isCorrect) {
                    handleCorrectAttempt();
                } else {
                    handleIncorrectAttempt(
                        currentQuestion,
                        {
                            expected: expectedAnswer,
                            userResponse: pronunciationTranscript,
                            type: 'pronunciation'
                        },
                        {
                            onRetry: () => {
                                pronunciationTranscript = '';
                                pronunciationCheckResult = null;
                                updateAttemptIndicator();
                                updatePronunciationUiState();
                            },
                            finalDelay: 2200
                        }
                    );
                }

                return;
            }

            if (isSpellingQuestion) {
                const acceptedAnswers = getAcceptedSpellingAnswers(currentQuestion);
                const expectedAnswer = acceptedAnswers[0] || getPronunciationTarget(currentQuestion);
                const isCorrect = isPhraseTypingQuestion
                    ? isPhraseKeywordMatch(spellingAnswer, acceptedAnswers)
                    : isSpellingMatch(spellingAnswer, acceptedAnswers);
                spellingCheckResult = {
                    isCorrect,
                    expected: expectedAnswer
                };
                const recommendation = buildCoachFeedback({
                    question: currentQuestion,
                    isCorrect,
                    expectedAnswer,
                    userResponse: spellingAnswer,
                    isSpellingQuestion: true,
                    isPhraseTypingQuestion
                });
                setLessonCoachFeedback(recommendation.message, recommendation.tone);
                requestAiCoachFeedback(
                    buildAiRecommendationContext({
                        question: currentQuestion,
                        isCorrect,
                        expectedAnswer,
                        userResponse: spellingAnswer,
                        isSpellingQuestion: true,
                        isPhraseTypingQuestion
                    }),
                    recommendation
                );
                updateSpellingUiState();

                const checkBtn = document.getElementById('check-button');
                if (checkBtn) {
                    checkBtn.disabled = true;
                    checkBtn.style.opacity = '0.5';
                }

                if (isCorrect) {
                    handleCorrectAttempt();
                } else {
                    handleIncorrectAttempt(
                        currentQuestion,
                        {
                            expected: expectedAnswer,
                            userResponse: spellingAnswer,
                            type: isPhraseTypingQuestion ? 'phrase_typing' : 'spelling'
                        },
                        {
                            onRetry: () => {
                                spellingCheckResult = null;
                                updateAttemptIndicator();
                                updateSpellingUiState();
                                document.getElementById('spelling-answer-input')?.focus();
                            },
                            finalDelay: 2200
                        }
                    );
                }

                return;
            }

            const selectedChoice = currentQuestion.choices[selectedAnswer];
            const isCorrect = selectedChoice === currentQuestion.answer;
            const correctIndex = currentQuestion.choices.indexOf(currentQuestion.answer);
            const recommendation = buildCoachFeedback({
                question: currentQuestion,
                isCorrect,
                selectedChoice,
                correctAnswer: currentQuestion.answer
            });
            setLessonCoachFeedback(recommendation.message, recommendation.tone);
            requestAiCoachFeedback(
                buildAiRecommendationContext({
                    question: currentQuestion,
                    isCorrect,
                    selectedChoice,
                    correctAnswer: currentQuestion.answer
                }),
                recommendation
            );

            // Visual feedback
            const cards = document.querySelectorAll('.image-card');
            if (isCorrect) {
                cards[selectedAnswer].style.boxShadow = '0 0 0 4px #10B981';
                handleCorrectAttempt();
            } else {
                cards[selectedAnswer].style.boxShadow = '0 0 0 4px #EF4444';
                if (correctIndex >= 0 && cards[correctIndex]) {
                    if (currentQuestionAttemptCount >= MAX_QUESTION_ATTEMPTS) {
                        cards[correctIndex].style.boxShadow = '0 0 0 4px #10B981';
                    }
                }
                handleIncorrectAttempt(
                    currentQuestion,
                    {
                        expected: currentQuestion.answer,
                        selectedChoice,
                        type: 'multiple_choice'
                    },
                    {
                        onRetry: () => {
                            document.querySelectorAll('.image-card').forEach(c => {
                                c.style.boxShadow = '';
                                c.classList.remove('selected');
                            });
                            selectedAnswer = null;
                            updateAttemptIndicator();
                            const retryCheckBtn = document.getElementById('check-button');
                            if (retryCheckBtn) {
                                retryCheckBtn.disabled = true;
                                retryCheckBtn.style.opacity = '0.5';
                            }
                        },
                        finalDelay: 2000
                    }
                );
            }

            // Disable check button
            const checkBtn = document.getElementById('check-button');
            checkBtn.disabled = true;
            checkBtn.style.opacity = '0.5';
        }

        // Firebase Google Sign-In
        async function firebaseGoogleLogin(redirectTo = 'dashboard', resetPreferences = false) {
            if (isNativePlatform()) {
                try {
                    const nativeGooglePlugin = await initializeNativeGoogleSignIn();
                    const signInResult = await nativeGooglePlugin.signIn();

                    if (!signInResult?.idToken) {
                        throw new Error('Google Sign-In did not return an ID token.');
                    }

                    const credential = firebase.auth.GoogleAuthProvider.credential(signInResult.idToken);
                    const authResult = await auth.signInWithCredential(credential);
                    handleAuthSuccess(authResult.user, { redirectTo, resetPreferences });
                    return;
                } catch (error) {
                    if (isGoogleSignInCanceled(error)) {
                        return;
                    }

                    console.error('Native Google login error:', error);
                    alert('Google login failed: ' + (error?.message || 'Unknown error.'));
                    return;
                }
            }

            auth.signInWithPopup(googleProvider)
                .then((result) => {
                    handleAuthSuccess(result.user, { redirectTo, resetPreferences });
                })
                .catch((error) => {
                    if (isGoogleSignInCanceled(error)) {
                        return;
                    }
                    console.error('Google login error:', error);
                    alert('Google login failed: ' + error.message);
                });
        }

        // Handle successful auth — save to Firestore + navigate
        function handleAuthSuccess(user, options = {}) {
            const redirectTo = options.redirectTo || 'dashboard';
            if (options.resetPreferences) {
                resetLearningPreferences();
            }

            renderLoadingSplash(redirectTo === 'dashboard'
                ? 'Loading your learning path...'
                : 'Signing you in...');

            hydrateAuthenticatedUser(user)
                .then(() => navigateTo(redirectTo))
                .catch(() => navigateTo(redirectTo));
        }

        // Register Screen

        function renderRegister() {
            const container = document.getElementById('content-container');

            const screen = createElement('div', 'flex flex-col h-full');
            screen.style.backgroundColor = '#1C1C1C';

            // Header with back button
            const header = createElement('div', 'flex items-center gap-4 p-4');
            const backBtn = createElement('button', 'btn-icon');
            backBtn.innerHTML = '<i data-lucide="arrow-left" style="width: 20px; height: 20px; color: #6BB6FF;"></i>';
            backBtn.onclick = navigateBack;

            const headerTitle = createElement('h2', 'text-white');
            headerTitle.style.fontSize = '20px';
            headerTitle.textContent = 'Create Account';

            header.appendChild(backBtn);
            header.appendChild(headerTitle);
            screen.appendChild(header);

            // Main content
            const content = createElement('div', 'flex-1 flex flex-col items-center justify-center px-8 gap-6');

            // Cow mascot
            const cowContainer = createElement('div', 'animate-float mb-4');
            cowContainer.appendChild(createCowMascot(100, true, 'encouraging'));
            content.appendChild(cowContainer);

            // Form
            const form = createElement('div', 'w-full max-w-md space-y-4');

            // Google Sign-Up button
            const googleBtn = createElement('button', 'w-full rounded-2xl');
            googleBtn.style.cssText = 'height: 56px; font-size: 16px; font-weight: 600; color: #333; border: none; cursor: pointer; background: white; border-radius: 1rem; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);';
            googleBtn.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span>Sign up with Google</span>
    `;
            googleBtn.onclick = () => firebaseGoogleLogin('quick-intro', true);
            form.appendChild(googleBtn);

            // Divider
            const divider = createElement('div', 'flex items-center gap-3');
            divider.style.margin = '0.5rem 0';
            divider.innerHTML = `
        <div style="flex: 1; height: 1px; background: #3a3a3a;"></div>
        <span style="color: #8899aa; font-size: 13px; font-weight: 500;">or register with email</span>
        <div style="flex: 1; height: 1px; background: #3a3a3a;"></div>
    `;
            form.appendChild(divider);

            const nameInput = createInput('Full Name', 'text');
            const emailInput = createInput('Email', 'email');
            const passwordInput = createInput('Password', 'password');
            const confirmPasswordInput = createInput('Confirm Password', 'password');

            const registerButton = createButton('CREATE ACCOUNT', () => {
                const name = nameInput.value;
                const email = emailInput.value;
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (!name || !email || !password || !confirmPassword) {
                    alert('Please fill in all fields');
                    return;
                }

                if (password !== confirmPassword) {
                    alert('Passwords do not match');
                    return;
                }

                // Firebase email/password registration
                auth.createUserWithEmailAndPassword(email, password)
                    .then((result) => {
                        // Set display name
                        return result.user.updateProfile({ displayName: name }).then(() => {
                            handleAuthSuccess(result.user, { redirectTo: 'quick-intro', resetPreferences: true });
                        });
                    })
                    .catch((error) => {
                        if (error.code === 'auth/email-already-in-use') {
                            alert('This email is already registered. Try logging in instead.');
                        } else if (error.code === 'auth/weak-password') {
                            alert('Password must be at least 6 characters.');
                        } else {
                            alert('Registration failed: ' + error.message);
                        }
                    });
            }, 'primary', true);
            registerButton.style.height = '56px';
            registerButton.style.fontSize = '16px';

            form.appendChild(nameInput);
            form.appendChild(emailInput);
            form.appendChild(passwordInput);
            form.appendChild(confirmPasswordInput);
            form.appendChild(registerButton);

            content.appendChild(form);
            screen.appendChild(content);
            container.appendChild(screen);

            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }
