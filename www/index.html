        function getCapacitorPlatform() {
            const capacitor = window.Capacitor;
            if (!capacitor || typeof capacitor.getPlatform !== 'function') {
                return 'web';
            }

            return capacitor.getPlatform();
        }

        function isNativePlatform() {
            return getCapacitorPlatform() !== 'web';
        }

        function getNativeGoogleSignInPlugin() {
            return window.Capacitor?.Plugins?.GoogleSignIn || null;
        }

        async function initializeNativeGoogleSignIn() {
            if (!isNativePlatform()) {
                return null;
            }

            const plugin = getNativeGoogleSignInPlugin();
            if (!plugin || typeof plugin.initialize !== 'function') {
                throw new Error('Native Google Sign-In plugin is not available in this APK build.');
            }

            if (!GOOGLE_SIGN_IN_CLIENT_ID || GOOGLE_SIGN_IN_CLIENT_ID.includes('YOUR_WEB_CLIENT_ID')) {
                throw new Error('Google Sign-In client ID is missing. Set window.CEBULINGO_GOOGLE_WEB_CLIENT_ID to your Web client ID.');
            }

            if (!nativeGoogleSignInInitPromise) {
                nativeGoogleSignInInitPromise = plugin.initialize({
                    clientId: GOOGLE_SIGN_IN_CLIENT_ID
                });
            }

            await nativeGoogleSignInInitPromise;
            return plugin;
        }

        function isGoogleSignInCanceled(error) {
            const code = (error?.code || '').toString().toUpperCase();
            const message = (error?.message || '').toString().toLowerCase();
            return code === 'SIGN_IN_CANCELED'
                || code === 'AUTH/POPUP-CLOSED-BY-USER'
                || message.includes('popup-closed-by-user')
                || message.includes('canceled')
                || message.includes('cancelled');
        }

        // Text-to-Speech
        const TTS = {
            currentAudio: null,
            getNativeBridge() {
                if (typeof window === 'undefined') {
                    return null;
                }

                const capacitor = window.Capacitor;
                if (!capacitor || typeof capacitor.getPlatform !== 'function' || capacitor.getPlatform() !== 'android') {
                    return null;
                }

                if (!window.NativeTTS || typeof window.NativeTTS.speak !== 'function') {
                    return null;
                }

                return window.NativeTTS;
            },
            getNativePlugin() {
                const capacitor = window.Capacitor;
                if (!capacitor || typeof capacitor.getPlatform !== 'function') {
                    return null;
                }

                if (capacitor.getPlatform() === 'web') {
                    return null;
                }

                return capacitor.Plugins?.TextToSpeech || null;
            },
            async speak(text, lang = 'fil-PH', audioSource = '') {
                const ttsEnabled = Storage.load('ttsEnabled');
                if (ttsEnabled === false) {
                    return false;
                }

                await this.stop();

                if (audioSource) {
                    await this.playAudioSource(audioSource);
                    return true;
                }

                const nativeBridge = this.getNativeBridge();
                if (nativeBridge) {
                    try {
                        if (typeof nativeBridge.isAvailable !== 'function' || nativeBridge.isAvailable()) {
                            nativeBridge.speak(text, lang);
                            return true;
                        }
                    } catch (error) {
                        console.warn('Native Android TTS bridge failed, falling back to plugin/browser audio.', error);
                    }
                }

                const nativePlugin = this.getNativePlugin();
                if (nativePlugin?.speak) {
                    try {
                        await nativePlugin.speak({
                            text,
                            lang,
                            rate: 0.85,
                            pitch: 1.0,
                            volume: 1.0
                        });
                        return true;
                    } catch (error) {
                        console.warn('Native TTS failed, falling back to browser speech synthesis.', error);
                    }
                }

                if ('speechSynthesis' in window) {
                    await new Promise((resolve, reject) => {
                        const utterance = new SpeechSynthesisUtterance(text);
                        utterance.lang = lang;
                        utterance.rate = 0.8;
                        utterance.onend = () => resolve();
                        utterance.onerror = (event) => reject(event);
                        window.speechSynthesis.cancel();
                        window.speechSynthesis.speak(utterance);
                    });
                    return true;
                }

                throw new Error('Audio playback is not supported on this device.');
            },
            async playAudioSource(audioSource) {
                return new Promise((resolve, reject) => {
                    const audio = new Audio(audioSource);
                    this.currentAudio = audio;
                    audio.preload = 'auto';
                    audio.onended = () => {
                        if (this.currentAudio === audio) {
                            this.currentAudio = null;
                        }
                        resolve();
                    };
                    audio.onerror = () => {
                        if (this.currentAudio === audio) {
                            this.currentAudio = null;
                        }
                        reject(new Error('The lesson audio file could not be played.'));
                    };

                    const playPromise = audio.play();
                    if (playPromise && typeof playPromise.then === 'function') {
                        playPromise.catch((error) => {
                            if (this.currentAudio === audio) {
                                this.currentAudio = null;
                            }
                            reject(error);
                        });
                    }
                });
            },
            async stop() {
                if (this.currentAudio) {
                    this.currentAudio.pause();
                    this.currentAudio.currentTime = 0;
                    this.currentAudio = null;
                }

                const nativeBridge = this.getNativeBridge();
                if (nativeBridge?.stop) {
                    try {
                        nativeBridge.stop();
                    } catch (error) {
                        console.warn('Native Android TTS stop failed.', error);
                    }
                }

                const nativePlugin = this.getNativePlugin();
                if (nativePlugin?.stop) {
                    try {
                        await nativePlugin.stop();
                    } catch (error) {
                        console.warn('Native TTS stop failed.', error);
                    }
                }

                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
            }
        };

        const MicrophoneAccess = {
            async ensurePermission() {
                if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
                    throw new Error('This browser does not support microphone access.');
                }

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                return true;
            }
        };

        const NativeSpeechRecognition = {
            pendingRequest: null,
            listenerAttached: false,
            getBridge() {
                if (typeof window === 'undefined') {
                    return null;
                }

                const capacitor = window.Capacitor;
                if (!capacitor || typeof capacitor.getPlatform !== 'function' || capacitor.getPlatform() !== 'android') {
                    return null;
                }

                if (!window.NativeSpeech || typeof window.NativeSpeech.startListening !== 'function') {
                    return null;
                }

                return window.NativeSpeech;
            },
            isSupported() {
                const bridge = this.getBridge();
                if (!bridge) {
                    return false;
                }

                if (typeof bridge.isAvailable === 'function') {
                    try {
                        return bridge.isAvailable();
                    } catch (error) {
                        console.warn('Native speech availability check failed.', error);
                    }
                }

                return true;
            },
            ensureListener() {
                if (this.listenerAttached || typeof window === 'undefined') {
                    return;
                }

                window.addEventListener('cebulingo-native-speech', (event) => {
                    const detail = event?.detail || {};
                    const request = this.pendingRequest;
                    if (!request || detail.sessionId !== request.sessionId) {
                        return;
                    }

                    if (detail.type === 'result') {
                        request.onResult(detail.transcript || '');
                    } else if (detail.type === 'error') {
                        request.onError(detail.message || 'Speech recognition failed. Please try again.');
                    }

                    request.onEnd();
                    this.pendingRequest = null;
                });

                this.listenerAttached = true;
            },
            startListening({
                lang = 'fil-PH',
                onStart = () => { },
                onResult = () => { },
                onError = () => { },
                onEnd = () => { }
            } = {}) {
                const bridge = this.getBridge();
                if (!bridge) {
                    return false;
                }

                this.ensureListener();

                if (this.pendingRequest) {
                    this.stopListening();
                }

                const sessionId = `native-speech-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
                this.pendingRequest = {
                    sessionId,
                    onResult,
                    onError,
                    onEnd
                };

                onStart();

                try {
                    bridge.startListening(sessionId, lang || 'fil-PH');
                } catch (error) {
                    this.pendingRequest = null;
                    onError(error?.message || 'Speech recognition failed to start.');
                    onEnd();
                }

                return true;
            },
            stopListening() {
                const bridge = this.getBridge();
                if (bridge && typeof bridge.cancel === 'function') {
                    try {
                        bridge.cancel();
                    } catch (error) {
                        console.warn('Native speech cancellation failed.', error);
                    }
                }

                this.pendingRequest = null;
            }
        };

        const PronunciationChecker = {
            recognition: null,
            getRecognitionConstructor() {
                return window.SpeechRecognition || window.webkitSpeechRecognition || null;
            },
            isSupported() {
                return NativeSpeechRecognition.isSupported() || Boolean(this.getRecognitionConstructor());
            },
            startListening({
                lang = 'fil-PH',
                onStart = () => { },
                onResult = () => { },
                onError = () => { },
                onEnd = () => { }
            } = {}) {
                if (NativeSpeechRecognition.isSupported()) {
                    NativeSpeechRecognition.startListening({
                        lang,
                        onStart,
                        onResult,
                        onError,
                        onEnd
                    });
                    return;
                }

                const RecognitionConstructor = this.getRecognitionConstructor();

                if (!RecognitionConstructor) {
                    onError('Speech recognition is not supported in this browser. Please use Chrome or Edge.');
                    onEnd();
                    return;
                }

                if (this.recognition) {
                    this.stopListening();
                }

                const recognition = new RecognitionConstructor();
                recognition.lang = lang;
                recognition.interimResults = false;
                recognition.continuous = false;
                recognition.maxAlternatives = 3;

                recognition.onstart = () => onStart();
                recognition.onresult = (event) => {
                    const transcript = Array.from(event.results || [])
                        .map((result) => result[0]?.transcript || '')
                        .join(' ')
                        .trim();

                    onResult(transcript);
                };
                recognition.onerror = (event) => {
                    const errorMap = {
                        'not-allowed': 'Microphone permission was denied.',
                        'no-speech': 'No speech was detected. Please try again.',
                        'audio-capture': 'No microphone was detected on this device.',
                        'network': 'Speech recognition needs an internet connection in this browser.',
                        'aborted': 'Listening was cancelled.'
                    };

                    onError(errorMap[event.error] || 'Speech recognition failed. Please try again.');
                };
                recognition.onend = () => {
                    this.recognition = null;
                    onEnd();
                };

                this.recognition = recognition;
                recognition.start();
            },
            stopListening() {
                NativeSpeechRecognition.stopListening();

                if (this.recognition) {
                    this.recognition.stop();
                    this.recognition = null;
                }
            }
        };

        setInterval(() => {
            Storage.save('userData', AppState.userData);
        }, 30000); // Save every 30 seconds

        let lastKnownMobileState = window.innerWidth <= 768;

        window.addEventListener('resize', () => {
            const nextMobileState = window.innerWidth <= 768;
            if (nextMobileState === lastKnownMobileState) {
                return;
            }

            lastKnownMobileState = nextMobileState;
            updateViewMode();

            if (AppState.currentScreen) {
                renderScreen(AppState.currentScreen);
            }
        });

        // Initialize app when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

        // Navigation System for CebuLingo

        function navigateTo(screen) {
            if (requiresAuth(screen) && !auth.currentUser) {
                screen = 'login';
            }

            // Add current screen to history
            if (AppState.currentScreen && AppState.currentScreen !== screen) {
                AppState.screenHistory.push(AppState.currentScreen);
            }

            // Update current screen
            AppState.currentScreen = screen;

            // Render the screen
            renderScreen(screen);
        }

        function requiresAuth(screen) {
            const publicScreens = new Set([
                'main-menu',
                'login',
                'register',
                'admin-login',
                'admin-dashboard'
            ]);

            return !publicScreens.has(screen);
        }

        function navigateBack() {
            if (AppState.screenHistory.length > 0) {
                const previousScreen = AppState.screenHistory.pop();
                AppState.currentScreen = previousScreen;
                renderScreen(previousScreen);
            } else {
                navigateTo('main-menu');
            }
        }

        function renderScreen(screen) {
            // Clear container
            clearContainer();

            // Stop any ongoing speech
            TTS.stop();
            PronunciationChecker.stopListening();

            // Check if admin page
            const isAdminPage = screen === 'admin-login' || screen === 'admin-dashboard';
            const app = document.getElementById('app');
            const container = document.getElementById('content-container');

            if (isAdminPage) {
                app.style.backgroundColor = '#0F172A';
                container.className = '';
                container.style.cssText = 'width: 100%; height: 100vh; max-width: 100%; border-radius: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;';
            } else {
                app.style.backgroundColor = '#1C1C1C';
                updateViewMode();
            }

            // Call the appropriate render function
            const renderFunctionName = `render${screen.split('-').map(s => capitalize(s)).join('')}`;
            const renderFunction = window[renderFunctionName];

            if (renderFunction) {
                renderFunction();
            } else {
                console.error(`Render function not found: ${renderFunctionName}`);
                renderMainMenu();
            }

            // Re-initialize Lucide icons
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        function normalizeValue(value) {
            return (value || '')
                .toString()
                .trim()
                .toLowerCase()
                .replace(/\s*&\s*/g, ' and ')
                .replace(/[^a-z0-9]+/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function normalizeCategory(value) {
            const normalized = normalizeValue(value);

            const categoryMap = {
                'travel and culture': 'travel and culture',
                'travel culture': 'travel and culture',
                'family and friends': 'family and friends',
                'family friends': 'family and friends',
                'work and business': 'work and business',
                'work business': 'work and business',
                'personal interest': 'personal interest',
                'personal interests': 'personal interest'
            };

            return categoryMap[normalized] || normalized;
        }

        function normalizeDifficulty(value) {
            const normalized = normalizeValue(value);

            const difficultyMap = {
                'easy': 'easy',
                'beginner': 'easy',
                'basic': 'easy',
                'complete beginner': 'easy',
                'some basics': 'easy',
                'intermediate': 'intermediate',
                'medium': 'intermediate',
                'advanced': 'hard',
                'hard': 'hard',
                'difficult': 'hard'
            };

            return difficultyMap[normalized] || normalized;
        }

        function getDifficultyForProficiency(proficiency) {
            const normalized = normalizeValue(proficiency);

            if (normalized === 'complete beginner' || normalized === 'some basics') {
                return 'easy';
            }

            if (normalized === 'intermediate') {
                return 'intermediate';
            }

            if (normalized === 'advanced') {
                return 'hard';
            }

            return null;
        }

        function setLearningPreference(key, value) {
            AppState.learningPreferences[key] = value;
            Storage.save('learningPreferences', AppState.learningPreferences);
            syncLearningPreferencesToFirestore().catch((error) => {
                console.error('Failed to sync learning preferences:', error);
            });
        }

        function resetLearningPreferences() {
            AppState.learningPreferences = {
                category: null,
                proficiency: null
            };
            Storage.save('learningPreferences', AppState.learningPreferences);
            syncLearningPreferencesToFirestore().catch((error) => {
                console.error('Failed to reset learning preferences in Firestore:', error);
            });
        }

        function syncLearningPreferencesToFirestore(user = auth.currentUser) {
            if (!user) {
                return Promise.resolve();
            }

            return db.collection(USER_PROFILE_COLLECTION).doc(user.uid).set({
                learningPreferences: {
                    category: AppState.learningPreferences.category ?? null,
                    proficiency: AppState.learningPreferences.proficiency ?? null
                },
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        }

        function getOrderedProficiencyLevels() {
            return ['Complete Beginner', 'Intermediate', 'Advanced'];
        }

        function getRecommendedProficiencyOptions(currentProficiency) {
            const levels = getOrderedProficiencyLevels();
            const currentIndex = levels.findIndex(level => normalizeValue(level) === normalizeValue(currentProficiency));

            if (currentIndex === -1) {
                return levels;
            }

            return levels.slice(currentIndex, currentIndex + 2).length > 1
                ? levels.slice(currentIndex, currentIndex + 2)
                : [levels[currentIndex]];
        }

        function getFilteredLessons() {
            const selectedCategory = normalizeCategory(AppState.learningPreferences.category);
            const selectedDifficulty = getDifficultyForProficiency(AppState.learningPreferences.proficiency);

            return AppState.lessonList.filter((lesson) => {
                const lessonCategory = normalizeCategory(lesson.category);
                const lessonDifficulty = normalizeDifficulty(lesson.difficulty);

                const matchesCategory = selectedCategory ? lessonCategory === selectedCategory : true;
                const matchesDifficulty = selectedDifficulty ? lessonDifficulty === selectedDifficulty : true;

                return matchesCategory && matchesDifficulty;
            });
        }

        function getLessonCreatedAtValue(createdAt) {
            if (!createdAt) return null;
            if (typeof createdAt === 'number') return createdAt;
            if (createdAt instanceof Date) return createdAt.getTime();
            if (typeof createdAt.toMillis === 'function') return createdAt.toMillis();
            if (typeof createdAt.seconds === 'number') return createdAt.seconds * 1000;
            return null;
        }

        function getLessonSortValue(lesson, fallbackIndex = 0) {
            const explicitOrder = [
                lesson.order,
                lesson.sortOrder,
                lesson.sequence,
                lesson.position,
                lesson.lessonNumber
            ].find(value => Number.isFinite(Number(value)));

            if (explicitOrder !== undefined) {
                return Number(explicitOrder);
            }

            const createdAtValue = getLessonCreatedAtValue(lesson.createdAt);
            if (createdAtValue !== null) {
                return createdAtValue;
            }

            return fallbackIndex;
        }

        function sortLessonsForPath(lessons) {
            return [...lessons]
                .map((lesson, index) => ({ lesson, index }))
                .sort((a, b) => getLessonSortValue(a.lesson, a.index) - getLessonSortValue(b.lesson, b.index))
                .map(item => item.lesson);
        }

        function getPathwayMeta(pathway, index = 0) {
            const normalized = normalizeCategory(pathway);
            const pathwayThemes = {
                'travel and culture': {
                    icon: 'plane',
                    color: '#2F7CF6',
                    accent: '#69A8FF',
                    description: 'Navigate trips, directions, and local culture with confidence.'
                },
                'family and friends': {
                    icon: 'users',
                    color: '#19C37D',
                    accent: '#63E6BE',
                    description: 'Talk naturally with relatives, friends, and people close to you.'
                },
                'work and business': {
                    icon: 'briefcase-business',
                    color: '#F59E0B',
                    accent: '#FCD34D',
                    description: 'Use Cebuano for meetings, clients, and workplace situations.'
                },
                'personal interest': {
                    icon: 'sparkles',
                    color: '#8B5CF6',
                    accent: '#C4B5FD',
                    description: 'Build fluency around hobbies, curiosity, and self-driven learning.'
                }
            };

            return pathwayThemes[normalized] || {
                icon: 'route',
                color: ['#2F7CF6', '#19C37D', '#F59E0B', '#EC4899'][index % 4],
                accent: '#E5E7EB',
                description: 'Progress through the lessons in this pathway.'
            };
        }

        function getGroupedLessonsByPathway(lessons) {
            const preferredOrder = [
                'travel and culture',
                'family and friends',
                'work and business',
                'personal interest'
            ];

            const pathwayMap = new Map();

            lessons.forEach((lesson) => {
                const pathwayName = lesson.pathway || lesson.path || lesson.category || 'General Pathway';
                const normalizedPathway = normalizeCategory(pathwayName) || 'general pathway';

                if (!pathwayMap.has(normalizedPathway)) {
                    pathwayMap.set(normalizedPathway, {
                        pathway: pathwayName,
                        normalizedPathway,
                        lessons: []
                    });
                }

                pathwayMap.get(normalizedPathway).lessons.push(lesson);
            });

            return [...pathwayMap.values()]
                .sort((a, b) => {
                    const aIndex = preferredOrder.indexOf(a.normalizedPathway);
                    const bIndex = preferredOrder.indexOf(b.normalizedPathway);

                    if (aIndex === -1 && bIndex === -1) {
                        return a.pathway.localeCompare(b.pathway);
                    }

                    if (aIndex === -1) return 1;
                    if (bIndex === -1) return -1;
                    return aIndex - bIndex;
                })
                .map(group => ({
                    ...group,
                    lessons: sortLessonsForPath(group.lessons)
                }));
        }

        function getGroupedLessonsByCategory(lessons) {
            const preferredOrder = [
                'travel and culture',
                'family and friends',
                'work and business',
                'personal interest'
            ];

            const categoryMap = new Map();

            lessons.forEach((lesson) => {
                const categoryName = lesson.category || 'General Category';
                const normalizedCategory = normalizeCategory(categoryName) || 'general category';

                if (!categoryMap.has(normalizedCategory)) {
                    categoryMap.set(normalizedCategory, {
                        category: categoryName,
                        normalizedCategory,
                        lessons: []
                    });
                }

                categoryMap.get(normalizedCategory).lessons.push(lesson);
            });

            return [...categoryMap.values()]
                .sort((a, b) => {
                    const aIndex = preferredOrder.indexOf(a.normalizedCategory);
                    const bIndex = preferredOrder.indexOf(b.normalizedCategory);

                    if (aIndex === -1 && bIndex === -1) {
                        return a.category.localeCompare(b.category);
                    }

                    if (aIndex === -1) return 1;
                    if (bIndex === -1) return -1;
                    return aIndex - bIndex;
                })
                .map(group => ({
                    ...group,
                    lessons: sortLessonsForPath(group.lessons)
                }));
        }

        function getModuleCategoryGroups() {
            const groupedLessons = getGroupedLessonsByCategory(AppState.lessonList || []);
            const firstIncompleteGroupIndex = groupedLessons.findIndex((group) =>
                Array.isArray(group.lessons) && group.lessons.some((lesson) => !isLessonCompleted(lesson))
            );
            const maxUnlockedIndex = firstIncompleteGroupIndex === -1
                ? groupedLessons.length - 1
                : Math.min(firstIncompleteGroupIndex + 1, groupedLessons.length - 1);

            return groupedLessons.map((group, index) => {
                const totalLessons = Array.isArray(group.lessons) ? group.lessons.length : 0;
                const completedLessons = totalLessons
                    ? group.lessons.filter((lesson) => isLessonCompleted(lesson))
                    : [];
                const completedCount = completedLessons.length;
                const isUnlocked = index <= maxUnlockedIndex;
                const isCurrent = firstIncompleteGroupIndex === -1
                    ? index === groupedLessons.length - 1
                    : index === firstIncompleteGroupIndex;
                const isNext = firstIncompleteGroupIndex !== -1 && index === firstIncompleteGroupIndex + 1;
                const isCompleted = totalLessons > 0 && completedCount === totalLessons;

                return {
                    ...group,
                    pathway: group.category,
                    normalizedPathway: group.normalizedCategory,
                    totalLessons,
                    completedLessons,
                    completedCount,
                    isUnlocked,
                    isCurrent,
                    isNext,
                    isCompleted
                };
            });
        }

        function isLessonCompleted(lesson) {
            const completedLessons = AppState.userData.completedLessons || [];
            return completedLessons.includes(lesson.id) || completedLessons.includes(lesson.title);
        }

        function getLessonState(lesson, lessonIndex, lessonsInCategory) {
            const explicitState = normalizeValue(lesson.status);
            if (['completed', 'current', 'unlocked', 'locked'].includes(explicitState)) {
                return explicitState;
            }

            const firstIncompleteIndex = lessonsInCategory.findIndex(item => !isLessonCompleted(item));

            if (isLessonCompleted(lesson)) {
                return 'completed';
            }

            if (firstIncompleteIndex === -1 || lessonIndex === firstIncompleteIndex) {
                return 'current';
            }

            return 'unlocked';
        }

        function getLessonStarCount(lesson) {
            if (Number.isFinite(Number(lesson.stars))) {
                return Math.max(0, Math.min(3, Number(lesson.stars)));
            }

            const difficulty = normalizeDifficulty(lesson.difficulty);
            if (difficulty === 'hard') return 3;
            if (difficulty === 'intermediate') return 2;
            return 1;
        }

        function getLessonXpValue(lesson) {
            if (Number.isFinite(Number(lesson.xp))) {
                return Number(lesson.xp);
            }

            const difficulty = normalizeDifficulty(lesson.difficulty);
            if (difficulty === 'hard') return 200;
            if (difficulty === 'intermediate') return 150;
            return 100;
        }

        function getLocalDateKey(date = new Date()) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getYesterdayDateKey(baseDate = new Date()) {
            const yesterday = new Date(baseDate);
            yesterday.setDate(yesterday.getDate() - 1);
            return getLocalDateKey(yesterday);
        }

        function getLessonCompletionKey(lesson = null) {
            return lesson?.id || lesson?.title || AppState.selectedLessonId || AppState.selectedLessonTitle || '';
        }

        function getCompletedLessonsCount() {
            const completedLessons = Array.isArray(AppState.userData.completedLessons)
                ? AppState.userData.completedLessons
                : [];

            return new Set(completedLessons.filter(Boolean)).size;
        }

        function calculateLevelFromXp(totalXP) {
            const xp = Math.max(0, Number(totalXP) || 0);
            return Math.max(1, Math.floor(xp / 1000) + 1);
        }

        function calculateLessonPercentage(correctAnswers, totalQuestions) {
            const safeTotalQuestions = Math.max(0, Number(totalQuestions) || 0);
            if (!safeTotalQuestions) {
                return 0;
            }

            const safeCorrectAnswers = Math.max(0, Number(correctAnswers) || 0);
            return Math.round((safeCorrectAnswers / safeTotalQuestions) * 100);
        }

        function calculateLessonXpAward(percentageScore) {
            const percentage = Math.max(0, Math.min(100, Number(percentageScore) || 0));
            if (percentage < 50) {
                return 0;
            }

            if (percentage === 100) {
                return 500;
            }

            return Math.round(200 + ((percentage - 50) / 50) * 300);
        }

        function getStarsForPercentage(percentageScore) {
            const percentage = Math.max(0, Math.min(100, Number(percentageScore) || 0));
            if (percentage >= 100) return 3;
            if (percentage >= 75) return 2;
            if (percentage >= 50) return 1;
            return 0;
        }

        function getLiveProfileAchievements() {
            const completedLessonsCount = getCompletedLessonsCount();
            const totalXP = Math.max(0, Number(AppState.userData.totalXP) || 0);
            const streak = Math.max(0, Number(AppState.userData.streak) || 0);
            const lessonResults = AppState.userData.lessonResults || {};
            const hasPerfectLesson = Object.values(lessonResults).some(result => Number(result?.percentage) === 100);
            const groupedLessons = getGroupedLessonsByPathway(AppState.lessonList || []);
            const totalLessons = Array.isArray(AppState.lessonList) ? AppState.lessonList.length : 0;
            const completedAllLessons = totalLessons > 0 && completedLessonsCount >= totalLessons;
            const completedAnyPathway = groupedLessons.some(group =>
                Array.isArray(group.lessons) &&
                group.lessons.length > 0 &&
                group.lessons.every(lesson => isLessonCompleted(lesson))
            );

            return [
                { id: 1, title: 'First Steps', desc: 'Complete your first lesson', icon: '\uD83C\uDFAF', unlocked: completedLessonsCount >= 1 },
                { id: 2, title: 'Week Warrior', desc: 'Maintain a 7-day streak', icon: '\uD83D\uDD25', unlocked: streak >= 7 },
                { id: 3, title: 'XP Master', desc: 'Earn 1000 XP', icon: '\u2B50', unlocked: totalXP >= 1000 },
                { id: 4, title: 'Perfect Score', desc: 'Get 100% on any lesson', icon: '\uD83D\uDCAF', unlocked: hasPerfectLesson },
                { id: 5, title: 'Unit Champion', desc: 'Complete every lesson in one pathway', icon: '\uD83C\uDFC6', unlocked: completedAnyPathway },
                { id: 6, title: 'Polyglot', desc: 'Complete all available lessons', icon: '\uD83C\uDF1F', unlocked: completedAllLessons }
            ];
        }

        function saveUserDataLocally() {
            Storage.save('userData', AppState.userData);
        }

        function syncLeaderboardProfile(user = auth.currentUser) {
            if (!user) {
                return Promise.resolve();
            }

            const leaderboardPayload = {
                uid: user.uid,
                name: AppState.userData.name || user.displayName || 'Language Learner',
                photoURL: AppState.userData.photoURL || user.photoURL || '',

            };

        function syncUserProgressToFirestore(user = auth.currentUser) {
            if (!user) {
                return Promise.resolve();
            }

            return Promise.all([
                db.collection(USER_PROFILE_COLLECTION).doc(user.uid).set({
                    streak: AppState.userData.streak ?? 0,
                    totalXP: AppState.userData.totalXP ?? 0,
                    currentLevel: AppState.userData.currentLevel ?? 1,
                    completedLessons: AppState.userData.completedLessons || [],
                    lessonResults: AppState.userData.lessonResults || {},
                    lastActiveDate: AppState.userData.lastActiveDate || '',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true }),
                syncLeaderboardProfile(user)
            ]);
        }

        async function updateUserDailyActivity(user = auth.currentUser) {
            const today = getLocalDateKey();
            const lastActiveDate = AppState.userData.lastActiveDate || '';

            if (lastActiveDate === today) {
                return;
            }

            AppState.userData.streak = lastActiveDate === getYesterdayDateKey()
                ? Math.max(0, Number(AppState.userData.streak) || 0) + 1
                : 1;
            AppState.userData.lastActiveDate = today;
            saveUserDataLocally();

            try {
                await syncUserProgressToFirestore(user);
            } catch (error) {
                console.error('Failed to sync daily activity:', error);
            }
        }

        function buildLessonCompletionSummary() {
            const totalQuestions = questions.length || AppState.lessonData.totalQuestions || 0;
            const percentageScore = calculateLessonPercentage(score, totalQuestions);
            const passed = percentageScore >= 50;
            const xpAwarded = calculateLessonXpAward(percentageScore);
            const starsEarned = getStarsForPercentage(percentageScore);

            return {
                score,
                totalQuestions,
                percentageScore,
                passed,
                xpAwarded,
                starsEarned
            };
        }

        function finalizeLessonAttempt() {
            if (AppState.lessonData.completionSummary) {
                return AppState.lessonData.completionSummary;
            }

            const selectedLesson = getSelectedLesson();
            const completionKey = getLessonCompletionKey(selectedLesson);
            const summary = buildLessonCompletionSummary();

            if (summary.passed) {
                const completedLessons = new Set(Array.isArray(AppState.userData.completedLessons) ? AppState.userData.completedLessons : []);
                if (completionKey) {
                    completedLessons.add(completionKey);
                }

                AppState.userData.completedLessons = Array.from(completedLessons);
                AppState.userData.totalXP = Math.max(0, Number(AppState.userData.totalXP) || 0) + summary.xpAwarded;
                AppState.userData.currentLevel = calculateLevelFromXp(AppState.userData.totalXP);

                if (completionKey) {
                    AppState.userData.lessonResults = {
                        ...(AppState.userData.lessonResults || {}),
                        [completionKey]: {
                            lessonId: selectedLesson?.id || AppState.selectedLessonId || '',
                            lessonTitle: selectedLesson?.title || AppState.selectedLessonTitle || '',
                            percentage: summary.percentageScore,
                            xpAwarded: summary.xpAwarded,
                            starsEarned: summary.starsEarned,
                            completedAt: getLocalDateKey()
                        }
                    };
                }

                saveUserDataLocally();
                syncUserProgressToFirestore().catch(err => console.error('Firestore sync failed:', err));
            }

            AppState.lessonData.completionSummary = summary;
            return summary;
        }

        function getLessonButtonIcon(lesson, state) {
            const lessonType = normalizeValue(lesson.type);

            if (state === 'completed') return 'check';
            if (state === 'locked') return 'lock';
            if (lessonType === 'practice') return 'dumbbell';
            if (lessonType === 'review') return 'refresh-cw';
            if (lessonType === 'story') return 'book-open';
            if (lessonType === 'boss') return 'crown';
            if (state === 'current') return 'play';
            return 'book-open';
        }

        function getAuthProvider(user) {
            if (!user || !user.providerData || !user.providerData.length) {
                return 'password';
            }

            const providerIds = user.providerData
                .map(provider => provider.providerId)
                .filter(Boolean);

            if (providerIds.includes('google.com')) {
                return 'google';
            }

            if (providerIds.includes('password')) {
                return 'password';
            }

            return providerIds[0] || 'password';
        }

        async function syncUserDocuments(user, options = {}) {
            const accountRef = db.collection(USER_ACCOUNT_COLLECTION).doc(user.uid);
            const profileRef = db.collection(USER_PROFILE_COLLECTION).doc(user.uid);
            const leaderboardRef = db.collection(LEADERBOARD_COLLECTION).doc(user.uid);

            const [accountSnapshot, profileSnapshot, leaderboardSnapshot] = await Promise.all([
                accountRef.get(),
                profileRef.get(),
                leaderboardRef.get()
            ]);

            const accountPayload = {
                uid: user.uid,
                email: user.email || '',
                displayName: user.displayName || 'Language Learner',
                photoURL: user.photoURL || '',
                provider: getAuthProvider(user),
                isActive: true,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (!accountSnapshot.exists) {
                accountPayload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            }

            const existingProfile = profileSnapshot.exists ? profileSnapshot.data() : {};
            const profilePayload = {
                name: user.displayName || existingProfile.name || AppState.userData.name || 'Language Learner',
                email: user.email || existingProfile.email || '',
                photoURL: user.photoURL || existingProfile.photoURL || '',
                streak: existingProfile.streak ?? AppState.userData.streak ?? 0,
                totalXP: existingProfile.totalXP ?? AppState.userData.totalXP ?? 0,
                currentLevel: existingProfile.currentLevel ?? AppState.userData.currentLevel ?? 1,
                completedLessons: existingProfile.completedLessons ?? AppState.userData.completedLessons ?? [],
                lessonResults: existingProfile.lessonResults ?? AppState.userData.lessonResults ?? {},
                lastActiveDate: existingProfile.lastActiveDate ?? AppState.userData.lastActiveDate ?? '',
                learningPreferences: {
                    category: profileSnapshot.exists
                        ? (existingProfile.learningPreferences?.category ?? null)
                        : (AppState.learningPreferences.category ?? null),
                    proficiency: profileSnapshot.exists
                        ? (existingProfile.learningPreferences?.proficiency ?? null)
                        : (AppState.learningPreferences.proficiency ?? null)
                },
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (!profileSnapshot.exists) {
                profilePayload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            }

            const existingLeaderboard = leaderboardSnapshot.exists ? leaderboardSnapshot.data() : {};
            const leaderboardPayload = {
                uid: user.uid,
                name: profilePayload.name || existingLeaderboard.name || 'Language Learner',
                photoURL: profilePayload.photoURL || existingLeaderboard.photoURL || '',
                totalXP: profilePayload.totalXP ?? existingLeaderboard.totalXP ?? 0,
                currentLevel: profilePayload.currentLevel ?? existingLeaderboard.currentLevel ?? 1,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (!leaderboardSnapshot.exists) {
                leaderboardPayload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            }

            await Promise.all([
                accountRef.set(accountPayload, { merge: true }),
                profileRef.set(profilePayload, { merge: true }),
                leaderboardRef.set(leaderboardPayload, { merge: true })
            ]);
        }

        async function hydrateAuthenticatedUser(user) {
            AppState.userData.name = user.displayName || AppState.userData.name;
            AppState.userData.email = user.email || '';
            AppState.userData.photoURL = user.photoURL || '';
            AppState.userData.uid = user.uid;

            await syncUserDocuments(user);

            const profileDoc = await db.collection(USER_PROFILE_COLLECTION).doc(user.uid).get();
            if (profileDoc.exists) {
                const data = profileDoc.data();
                AppState.userData.name = data.name || AppState.userData.name;
                AppState.userData.email = data.email || AppState.userData.email;
                AppState.userData.photoURL = data.photoURL || AppState.userData.photoURL;
                AppState.userData.streak = data.streak ?? AppState.userData.streak;
                AppState.userData.totalXP = data.totalXP ?? AppState.userData.totalXP;
                AppState.userData.currentLevel = data.currentLevel ?? AppState.userData.currentLevel;
                AppState.userData.completedLessons = data.completedLessons || AppState.userData.completedLessons;
                AppState.userData.lessonResults = data.lessonResults || AppState.userData.lessonResults;
                AppState.userData.lastActiveDate = data.lastActiveDate || AppState.userData.lastActiveDate;

                AppState.learningPreferences = {
                    category: data.learningPreferences?.category ?? null,
                    proficiency: data.learningPreferences?.proficiency ?? null
                };
                Storage.save('learningPreferences', AppState.learningPreferences);
            }

            await updateUserDailyActivity(user);
            saveUserDataLocally();
        }

        // Dashboard Screen - 3D Learning Path

        // Fetching Lessons - Non-Static View
        async function fetchLessonsFromFirestore() {
            try {
                const snapshot = await contentDb.collection('lessons').orderBy('createdAt', 'desc').get();

                AppState.lessonList = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
            } catch (error) {
                console.error('Error fetching lessons:', error);
                AppState.lessonList = [];
            }
        }

        async function fetchQuestionsForLesson(lessonId) {
            try {
                const snapshot = await contentDb.collection('lessons').doc(lessonId).collection('questions').get();

                return snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
            } catch (error) {
                console.error('Error fetching questions:', error);
                return [];
            }
        }

            const container = document.getElementById('content-container');
            const isMobile = AppState.isMobile;

                        const xpBadge = createElement('div', 'mt-3');
                        xpBadge.style.cssText = 'display: inline-flex; align-items: center; justify-content: center; padding: 0.55rem 0.85rem; border-radius: 999px; background: #2A2A2A; border: 1px solid #343434;';

                        lessonInfo.appendChild(lessonTitle);
                        lessonInfo.appendChild(starsContainer);
                        lessonInfo.appendChild(xpBadge);
                        lessonInfo.appendChild(difficultyText);

                        lessonCard.appendChild(lessonButton);
                        lessonCard.appendChild(lessonInfo);
                        lessonRow.appendChild(lessonCard);
                        pathContainer.appendChild(lessonRow);
                    });

                    categorySection.appendChild(pathContainer);
                    content.appendChild(categorySection);
                });
            }

            contentHost.replaceChildren(content);

            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        async function fetchLeaderboardPlayers(limitCount = 100) {
            try {
                console.log('[Leaderboard] Starting fetch', {
                    collection: LEADERBOARD_COLLECTION,
                    orderBy: 'totalXP',
                    direction: 'desc',
                    limit: limitCount,
                    currentUserUid: auth.currentUser?.uid || null
                });

                const snapshot = await db
                    .collection(LEADERBOARD_COLLECTION)
                    .orderBy('totalXP', 'desc')
                    .limit(limitCount)
                    .get();

                console.log('[Leaderboard] Fetch succeeded', {
                    count: snapshot.size,
                    empty: snapshot.empty
                });

                const players = snapshot.docs.map((doc, index) => {
                    const data = doc.data() || {};
                    const xp = Math.max(0, Number(data.totalXP) || 0);

                    return {
                        uid: doc.id,
                        rank: index + 1,
                        name: data.name || data.displayName || 'Language Learner',
                        photoURL: data.photoURL || '',
                        xp,
                        isCurrentUser: Boolean(auth.currentUser && auth.currentUser.uid === doc.id)
                    };
                });

                console.log('[Leaderboard] Parsed players preview', players.slice(0, 5));
                return players;
            } catch (error) {
                console.error('[Leaderboard] Fetch failed', {
                    message: error?.message || 'Unknown error',
                    code: error?.code || null,
                    name: error?.name || null,
                    stack: error?.stack || null,
                    currentUserUid: auth.currentUser?.uid || null
                });
                return null;
            }
        }

        function shuffleArray(items = []) {
            const shuffled = [...items];

            for (let index = shuffled.length - 1; index > 0; index -= 1) {
                const randomIndex = Math.floor(Math.random() * (index + 1));
                [shuffled[index], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[index]];
            }

            return shuffled;
        }

        const AIRecommendationService = {
            hasEndpoint() {
                return Boolean(this.getEndpoint());
            },
            getEndpoint() {
                const runtimeEndpoint = typeof window !== 'undefined' && typeof window.CEBULINGO_AI_RECOMMENDER_URL === 'string'
                    ? window.CEBULINGO_AI_RECOMMENDER_URL
                    : '';
                const savedEndpoint = Storage.load('aiRecommendationEndpoint');
                return ((savedEndpoint || runtimeEndpoint || '') + '').trim();
            },
            setEndpoint(url = '') {
                const normalizedUrl = (url || '').toString().trim();
                if (!normalizedUrl) {
                    Storage.clear('aiRecommendationEndpoint');
                    return;
                }

                Storage.save('aiRecommendationEndpoint', normalizedUrl);
            },
            async generate(context) {
                const endpoint = this.getEndpoint();
                if (!endpoint) {
                    return null;
                }

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(context),
                        signal: controller.signal
                    });

                    if (!response.ok) {
                        throw new Error(`Recommendation endpoint returned ${response.status}`);
                    }

                    const data = await response.json();
                    if (!data || typeof data.message !== 'string' || !data.message.trim()) {
                        return null;
                    }

                    return {
                        message: data.message.trim(),
                        tone: data.tone || context.defaultTone || (typeof context.isCorrect === 'boolean'
                            ? (context.isCorrect ? 'success' : 'warning')
                            : 'info'),
                        recommendedPathway: typeof data.recommendedPathway === 'string' ? data.recommendedPathway.trim() : '',
                        recommendedProficiency: typeof data.recommendedProficiency === 'string' ? data.recommendedProficiency.trim() : ''
                    };
                } catch (error) {
                    console.warn('AI recommendation fallback in use.', error);
                    return null;
                } finally {
                    clearTimeout(timeoutId);
                }
            }
        };

        if (typeof window !== 'undefined') {
            window.CebuLingoAI = {
                setRecommendationEndpoint(url) {
                    AIRecommendationService.setEndpoint(url);
                },
                getRecommendationEndpoint() {
                    return AIRecommendationService.getEndpoint();
                }
            };
        }

        function buildAiRecommendationContext({
            question,
            isCorrect,
            selectedChoice = '',
            correctAnswer = '',
            expectedAnswer = '',
            userResponse = '',
            isPronunciationQuestion = false,
            isSpellingQuestion = false,
            isPhraseTypingQuestion = false,
            isPhrasePronunciationQuestion = false
        }) {
            return {
                questionText: question?.question || '',
                promptText: question?.prompt || '',
                correctAnswer: correctAnswer || expectedAnswer || '',
                userAnswer: selectedChoice || userResponse || '',
                choices: Array.isArray(question?.choices) ? question.choices : [],
                isCorrect,
                attemptsUsed: currentQuestionAttemptCount,
                attemptsRemaining: getRemainingAttempts(),
                revealAnswer: getRemainingAttempts() === 0,
                difficulty: question?.difficulty || '',
                lessonType: question?.lessonType || question?.type || '',
                questionType: isPronunciationQuestion
                    ? (isPhrasePronunciationQuestion ? 'phrase_pronunciation' : 'pronunciation')
                    : isSpellingQuestion
                        ? (isPhraseTypingQuestion ? 'phrase_typing' : 'spelling')
                        : 'multiple_choice',
                hasImage: Boolean(question?.imageUrl)
            };
        }

        async function requestAiCoachFeedback(context, fallbackFeedback) {
            const requestToken = ++coachRequestToken;
            const questionIndexAtRequest = currentQuestionIndex;
            const shouldShowThinkingState = AIRecommendationService.hasEndpoint() && !context.isCorrect;

            if (shouldShowThinkingState) {
                setLessonCoachFeedback('Thinking of a clue for you...', 'info');
            }

            const aiFeedback = await AIRecommendationService.generate(context);

            if (!aiFeedback) {
                if (requestToken === coachRequestToken && questionIndexAtRequest === currentQuestionIndex) {
                    setLessonCoachFeedback(fallbackFeedback.message, fallbackFeedback.tone);
                }
                return fallbackFeedback;
            }

            if (requestToken !== coachRequestToken || questionIndexAtRequest !== currentQuestionIndex) {
                return fallbackFeedback;
            }

            setLessonCoachFeedback(aiFeedback.message, aiFeedback.tone);
            return aiFeedback;
        }

        function hasCompletedAllVisibleLessons(lessons = []) {
            return Array.isArray(lessons) && lessons.length > 0 && lessons.every(lesson => isLessonCompleted(lesson));
        }

        function getAlternativeLessonGroups(visibleGroups = []) {
            const visiblePathways = new Set((visibleGroups || []).map(group => group.normalizedPathway));

            return getGroupedLessonsByPathway(AppState.lessonList || []).filter(group =>
                !visiblePathways.has(group.normalizedPathway) &&
                Array.isArray(group.lessons) &&
                group.lessons.some(lesson => !isLessonCompleted(lesson))
            );
        }

        function getVisibleLessonPerformanceSummary(lessons = []) {
            const lessonResults = AppState.userData.lessonResults || {};
            let completedCount = 0;
            let perfectCount = 0;
            let totalPercentage = 0;

            (lessons || []).forEach((lesson) => {
                const completionKey = getLessonCompletionKey(lesson);
                const result = completionKey ? lessonResults[completionKey] : null;
                if (!result || !isLessonCompleted(lesson)) {
                    return;
                }

                const percentage = Math.max(0, Math.min(100, Number(result.percentage) || 0));
                completedCount++;
                totalPercentage += percentage;

                if (percentage === 100) {
                    perfectCount++;
                }
            });

            return {
                completedCount,
                perfectCount,
                averagePercentage: completedCount ? Math.round(totalPercentage / completedCount) : 0
            };
        }

        function buildDashboardPathSuggestionFallback(alternativeGroups = [], performanceSummary = {}) {
            if (!alternativeGroups.length) {
                return null;
            }

            const nextGroup = alternativeGroups[0];
            const starterLesson = nextGroup.lessons.find(lesson => !isLessonCompleted(lesson)) || nextGroup.lessons[0];
            const starterLessonText = starterLesson?.title ? ` Start with ${starterLesson.title}.` : '';
            const proficiencyOptions = getRecommendedProficiencyOptions(AppState.learningPreferences.proficiency);
            const shouldPromoteDifficulty = proficiencyOptions.length > 1 && Number(performanceSummary.averagePercentage || 0) >= 85;
            const recommendedProficiency = shouldPromoteDifficulty ? proficiencyOptions[1] : (proficiencyOptions[0] || AppState.learningPreferences.proficiency || '');
            const promotionText = shouldPromoteDifficulty
                ? ` You look ready to move up to ${recommendedProficiency}.`
                : '';

            return {
                message: `You completed this dashboard path. Try ${nextGroup.pathway} next for a different Cebuano context and fresh vocabulary.${promotionText}${starterLessonText}`,
                tone: 'info',
                recommendedPathway: nextGroup.pathway,
                recommendedProficiency
            };
        }

        function buildDashboardPathSuggestionContext(visibleGroups, alternativeGroups, filteredLessons) {
            const performanceSummary = getVisibleLessonPerformanceSummary(filteredLessons);
            return {
                task: 'dashboard_pathway_suggestion',
                currentCategory: AppState.learningPreferences.category || '',
                currentProficiency: AppState.learningPreferences.proficiency || '',
                currentDifficulty: getDifficultyForProficiency(AppState.learningPreferences.proficiency) || '',
                completedLessonsOnDashboard: Array.isArray(filteredLessons) ? filteredLessons.length : 0,
                completedVisibleLessons: performanceSummary.completedCount,
                averageVisibleScore: performanceSummary.averagePercentage,
                perfectVisibleLessons: performanceSummary.perfectCount,
                completedPathways: (visibleGroups || [])
                    .filter(group => Array.isArray(group.lessons) && group.lessons.length && group.lessons.every(lesson => isLessonCompleted(lesson)))
                    .map(group => group.pathway),
                recommendedProficiencyOptions: getRecommendedProficiencyOptions(AppState.learningPreferences.proficiency),
                availableAlternativePathways: (alternativeGroups || []).slice(0, 4).map(group => {

                    return {
                        pathway: group.pathway,
                        description: getPathwayMeta(group.pathway).description,
                        starterLessonTitle: starterLesson.title || '',
                        lessonCount: Array.isArray(group.lessons) ? group.lessons.length : 0
                    };
                }),

            };

        function setDashboardPathSuggestion(message = '', tone = 'info', metadata = {}) {
            dashboardPathSuggestion = message ? { message, tone, ...metadata } : null;

            const card = document.getElementById('dashboard-path-suggestion-card');
            const text = document.getElementById('dashboard-path-suggestion-text');

            if (!card || !text) {
                return;
            }

            if (!message) {
                card.style.display = 'none';
                text.textContent = '';
                return;
            }

            const palette = {
                info: {
                    border: 'rgba(107,182,255,0.26)',

                    shadow: '0 18px 40px rgba(16,24,40,0.24)',
                    eyebrow: '#8CC8FF',
                    text: '#EAF4FF'
                },
                success: {
                    border: 'rgba(16,185,129,0.28)',
                    background: 'linear-gradient(180deg, rgba(19,45,35,0.96) 0%, rgba(18,36,29,0.96) 100%)',
                    shadow: '0 18px 40px rgba(16,185,129,0.16)',
                    eyebrow: '#86EFAC',
                    text: '#ECFDF5'
                }
            };
